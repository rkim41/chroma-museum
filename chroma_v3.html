<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chroma">
<meta name="theme-color" content="#0a0a0a">
<title>Chroma</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    width: 100%;
    background: #0a0a0a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ─── Splash / Permission screen ─── */
  .splash {
    position: fixed; inset: 0;
    background: #F5F0E8;
    color: #1A1A1A;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px;
    z-index: 10;
  }
  .splash.hidden { display: none; }
  .splash-hex { font-size: 42px; margin-bottom: 12px; }
  .splash-title { font-size: 42px; font-weight: 300; letter-spacing: 8px; margin-bottom: 6px; }
  .splash-tag { font-size: 11px; color: #8A8680; letter-spacing: 3px; margin-bottom: 60px; }
  .splash-body { font-size: 15px; color: #8A8680; text-align: center; line-height: 1.5; margin-bottom: 32px; max-width: 300px; }
  .splash-btn {
    background: #1A1A1A; color: #fff;
    border: none; padding: 16px 40px;
    border-radius: 14px; font-size: 16px; font-weight: 500;
    letter-spacing: 0.5px; cursor: pointer;
  }
  .splash-btn:active { opacity: 0.7; }
  .splash-err { color: #b83a2e; font-size: 13px; margin-top: 20px; text-align: center; max-width: 280px; }

  /* ─── Main camera view ─── */
  .stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background: #000;
  }
  #video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transition: filter 0.15s ease;
  }
  #video.mode-deuter { filter: url(#deuter-filter); }
  #video.mode-trit   { filter: url(#trit-filter); }

  /* Top bar */
  .topbar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top) + 12px) 20px 12px;
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    z-index: 3;
  }
  .brand { font-size: 15px; letter-spacing: 4px; font-weight: 300; }
  .mode-badge {
    font-size: 11px; letter-spacing: 1px;
    background: rgba(255,255,255,0.15);
    padding: 5px 12px; border-radius: 20px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* Bottom control area */
  .controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 20px calc(env(safe-area-inset-bottom) + 24px);
    background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
    z-index: 3;
    display: flex; flex-direction: column; gap: 20px;
    align-items: center;
  }

  .mode-switch {
    display: flex; gap: 6px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 5px; border-radius: 14px;
  }
  .mode-btn {
    background: transparent; border: none;
    color: rgba(255,255,255,0.65);
    padding: 9px 16px;
    font-size: 13px; font-weight: 500; letter-spacing: 0.3px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .mode-btn.active { background: #fff; color: #000; }

  .capture-row {
    display: flex; align-items: center; justify-content: center;
    gap: 40px; width: 100%;
  }
  .capture-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 3px solid #fff;
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
  }
  .capture-btn:active { transform: scale(0.92); }
  .capture-btn-inner {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #fff;
  }
  .side-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: none;
    color: #fff; font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .side-btn svg { width: 22px; height: 22px; fill: #fff; }

  /* Freeze overlay for review */
  .freeze {
    position: absolute; inset: 0;
    z-index: 5;
    background: #000;
    display: none;
    flex-direction: column;
  }
  .freeze.show { display: flex; }
  .freeze-img {
    flex: 1;
    width: 100%;
    object-fit: contain;
    background: #000;
  }
  .freeze-controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 20px calc(env(safe-area-inset-bottom) + 24px);
    display: flex; gap: 12px;
    background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
  }
  .freeze-btn {
    flex: 1; padding: 16px;
    border-radius: 14px; border: none;
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .freeze-btn.secondary {
    background: rgba(255,255,255,0.15);
    color: #fff;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .freeze-btn.primary { background: #fff; color: #000; }
  .freeze-badge {
    position: absolute; top: calc(env(safe-area-inset-top) + 16px); left: 16px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff; font-size: 12px;
    padding: 6px 12px; border-radius: 10px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 40%; left: 50%;
    transform: translate(-50%, 0);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SVG filters (hidden, referenced by CSS filter: url(...)) -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <!--
      DEUTERANOPIA correction
      Route green energy into BLUE output so greens turn teal.
      Reds remain warm — warm/cool distinction is on the axis deuteranopes CAN see.
      Verified against PDF test cases (trees no longer pink, GS logo distinguishable).
    -->
    <filter id="deuter-filter">
      <feColorMatrix type="matrix" values="
        1.000  0.000  0.000  0  0
        0.000  1.000  0.000  0  0
        0.000  0.400  0.600  0  0
        0      0      0      1  0
      "/>
    </filter>

    <!--
      TRITANOPIA correction
      Route blue energy into RED output so blues turn purple.
      Distinguishable from greens on the red-green axis tritanopes CAN see.
    -->
    <filter id="trit-filter">
      <feColorMatrix type="matrix" values="
        1.000  0.000  0.400  0  0
        0.000  1.000  0.000  0  0
        0.000  0.000  0.600  0  0
        0      0      0      1  0
      "/>
    </filter>
  </defs>
</svg>

<!-- Splash / permission screen -->
<div class="splash" id="splash">
  <div class="splash-hex">⬡</div>
  <div class="splash-title">CHROMA</div>
  <div class="splash-tag">COLOR VISION ASSIST</div>
  <div class="splash-body">
    Point your camera at the world and see it enhanced for color-blind vision.
  </div>
  <button class="splash-btn" id="startBtn">Start Camera</button>
  <div class="splash-err" id="errMsg"></div>
</div>

<!-- Main stage -->
<div class="stage" id="stage" style="display:none">
  <video id="video" autoplay playsinline muted></video>

  <div class="topbar">
    <div class="brand">CHROMA</div>
    <div class="mode-badge" id="modeBadge">Deuteranopia</div>
  </div>

  <div class="controls">
    <div class="mode-switch">
      <button class="mode-btn" data-mode="none">Original</button>
      <button class="mode-btn active" data-mode="deuter">Deuteran.</button>
      <button class="mode-btn" data-mode="trit">Tritan.</button>
    </div>
    <div class="capture-row">
      <button class="side-btn" id="flipBtn" title="Flip camera">
        <svg viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM7.5 15c-2.21 0-4-1.79-4-4h1.5l-2-2-2 2H2.5c0 2.76 2.24 5 5 5v-1zm9-6l2 2H20c0 2.76-2.24 5-5 5v1c2.21 0 4-1.79 4-4h-1.5l2-2z"/></svg>
      </button>
      <button class="capture-btn" id="captureBtn">
        <div class="capture-btn-inner"></div>
      </button>
      <div style="width:44px"></div>
    </div>
  </div>
</div>

<!-- Freeze / review overlay -->
<div class="freeze" id="freeze">
  <div class="freeze-badge" id="freezeBadge">Deuteranopia Enhanced</div>
  <img class="freeze-img" id="freezeImg" alt="Captured">
  <div class="freeze-controls">
    <button class="freeze-btn secondary" id="retakeBtn">Retake</button>
    <button class="freeze-btn primary" id="saveBtn">Save</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<canvas id="canvas" style="display:none"></canvas>

<script>
  const splash = document.getElementById('splash');
  const stage = document.getElementById('stage');
  const startBtn = document.getElementById('startBtn');
  const errMsg = document.getElementById('errMsg');
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const captureBtn = document.getElementById('captureBtn');
  const flipBtn = document.getElementById('flipBtn');
  const modeBadge = document.getElementById('modeBadge');
  const freeze = document.getElementById('freeze');
  const freezeImg = document.getElementById('freezeImg');
  const freezeBadge = document.getElementById('freezeBadge');
  const retakeBtn = document.getElementById('retakeBtn');
  const saveBtn = document.getElementById('saveBtn');
  const toast = document.getElementById('toast');
  const modeBtns = document.querySelectorAll('.mode-btn');

  let currentStream = null;
  let facingMode = 'environment'; // rear camera default
  let currentMode = 'deuter';
  let capturedBlob = null;

  const MODE_LABELS = {
    none: 'Original',
    deuter: 'Deuteranopia',
    trit: 'Tritanopia',
  };

  // ─── Camera start ───────────────────────────────────
  async function startCamera() {
    errMsg.textContent = '';
    if (!navigator.mediaDevices?.getUserMedia) {
      errMsg.textContent = 'Camera API not available. This app must be opened over HTTPS.';
      return;
    }
    try {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false,
      });
      currentStream = stream;
      video.srcObject = stream;
      splash.classList.add('hidden');
      stage.style.display = 'flex';
      applyMode(currentMode);
    } catch (e) {
      const msg = e?.name === 'NotAllowedError'
        ? 'Camera permission denied. Please allow access and reload.'
        : `Could not open camera: ${e.message || e.name}`;
      errMsg.textContent = msg;
    }
  }

  startBtn.addEventListener('click', startCamera);
  flipBtn.addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  });

  // ─── Mode switching ─────────────────────────────────
  function applyMode(mode) {
    currentMode = mode;
    video.classList.remove('mode-deuter', 'mode-trit');
    if (mode === 'deuter') video.classList.add('mode-deuter');
    if (mode === 'trit') video.classList.add('mode-trit');
    modeBadge.textContent = MODE_LABELS[mode];
    modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  }
  modeBtns.forEach(b => b.addEventListener('click', () => applyMode(b.dataset.mode)));

  // ─── Capture ────────────────────────────────────────
  captureBtn.addEventListener('click', capture);

  async function capture() {
    if (!video.videoWidth) return;
    if (navigator.vibrate) navigator.vibrate(30);

    const w = video.videoWidth;
    const h = video.videoHeight;
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');

    // Apply the same color matrix to the captured frame
    ctx.filter = getCanvasFilter(currentMode);
    ctx.drawImage(video, 0, 0, w, h);
    ctx.filter = 'none';

    canvas.toBlob((blob) => {
      capturedBlob = blob;
      freezeImg.src = URL.createObjectURL(blob);
      freezeBadge.textContent = `${MODE_LABELS[currentMode]}${currentMode !== 'none' ? ' Enhanced' : ''}`;
      freeze.classList.add('show');
    }, 'image/jpeg', 0.92);
  }

  // Canvas 2D supports 'url(#id)' filters referring to inline SVG in the same document
  function getCanvasFilter(mode) {
    if (mode === 'deuter') return 'url(#deuter-filter)';
    if (mode === 'trit') return 'url(#trit-filter)';
    return 'none';
  }

  retakeBtn.addEventListener('click', () => {
    freeze.classList.remove('show');
    if (freezeImg.src) URL.revokeObjectURL(freezeImg.src);
    capturedBlob = null;
  });

  // ─── Save (download to Files/Photos) ────────────────
  saveBtn.addEventListener('click', async () => {
    if (!capturedBlob) return;
    const ts = new Date().toISOString().replace(/[:.]/g, '-');
    const filename = `chroma-${currentMode}-${ts}.jpg`;

    // Preferred: Web Share API (iOS Safari supports it — lets user save to Photos)
    if (navigator.canShare && navigator.canShare({ files: [new File([capturedBlob], filename, { type: 'image/jpeg' })] })) {
      try {
        await navigator.share({
          files: [new File([capturedBlob], filename, { type: 'image/jpeg' })],
          title: 'Chroma capture',
        });
        showToast('Shared');
        return;
      } catch (e) {
        // user cancelled — fall through to download
        if (e.name === 'AbortError') return;
      }
    }

    // Fallback: download link
    const url = URL.createObjectURL(capturedBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Saved');
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1400);
  }

  // Prevent iOS bounce/scroll behind fullscreen
  document.addEventListener('touchmove', (e) => {
    if (e.target === video || e.target.closest('.controls, .topbar, .freeze-controls')) return;
    e.preventDefault();
  }, { passive: false });
</script>
</body>
</html>
